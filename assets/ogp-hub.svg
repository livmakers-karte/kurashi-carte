<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="暮らしのカルテ 暮らし・住まいの悩みを診断で数値化する総合メディア">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7FCFC"/><stop offset="1" stop-color="#DCEEF0"/>
    </linearGradient>
    <linearGradient id="od" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5EBACE"/><stop offset="1" stop-color="#2C7E92"/>
    </linearGradient>
    <linearGradient id="oroof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4795B"/><stop offset="1" stop-color="#E15c3f"/>
    </linearGradient>
    <radialGradient id="osun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FDE9A6"/><stop offset="1" stop-color="#F7C948"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="120" cy="110" r="46" fill="url(#osun)" opacity="0.9"/>
  <g fill="none" stroke="#74B79B" stroke-width="2" opacity="0.4">
    <circle cx="1040" cy="120" r="16"/><circle cx="980" cy="70" r="9"/>
  </g>

  <!-- left: copy -->
  <g transform="translate(80 200)">
    <rect x="0" y="-70" width="150" height="34" rx="17" fill="#FBDDD3"/>
    <text x="18" y="-47" font-family="'Hiragino Maru Gothic ProN',sans-serif" font-size="17" font-weight="800" fill="#B5432C">暮らしの診断メディア</text>
    <text x="0" y="20" font-family="'Hiragino Maru Gothic ProN','Yu Gothic',sans-serif" font-size="62" font-weight="800" fill="#0E3A47">暮らしのカルテ</text>
    <text x="0" y="92" font-family="'Hiragino Maru Gothic ProN','Yu Gothic',sans-serif" font-size="30" font-weight="700" fill="#2C7E92">住まい・暮らしの「気になる」を</text>
    <text x="0" y="136" font-family="'Hiragino Maru Gothic ProN','Yu Gothic',sans-serif" font-size="30" font-weight="700" fill="#2C7E92">数値で見える化する無料診断</text>
    <g transform="translate(0 176)">
      <rect width="176" height="44" rx="22" fill="#F4795B"/>
      <text x="88" y="29" text-anchor="middle" font-family="'Hiragino Maru Gothic ProN',sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">ダニ・洗濯・水回り</text>
      <text x="200" y="29" font-family="Verdana,sans-serif" font-size="15" fill="#67787D">kurashi-carte.jp</text>
    </g>
  </g>

  <!-- right: house + karte + drop -->
  <g transform="translate(760 150)">
    <!-- house -->
    <g transform="translate(0 120)">
      <rect x="30" y="90" width="160" height="120" rx="12" fill="#F7FCFC" stroke="#2C7E92" stroke-width="4"/>
      <path d="M20 94 L110 26 L200 94 Z" fill="url(#oroof)" stroke="#C24a2f" stroke-width="3"/>
      <rect x="54" y="116" width="52" height="52" rx="6" fill="#FDE9A6" stroke="#2C7E92" stroke-width="3"/>
      <line x1="80" y1="116" x2="80" y2="168" stroke="#2C7E92" stroke-width="3"/>
      <line x1="54" y1="142" x2="106" y2="142" stroke="#2C7E92" stroke-width="3"/>
      <rect x="130" y="140" width="46" height="70" rx="8" fill="#8FD3E0" stroke="#2C7E92" stroke-width="3"/>
    </g>
    <!-- karte card -->
    <g transform="translate(150 0) rotate(-5)">
      <rect x="0" y="0" width="230" height="210" rx="18" fill="#FFFFFF" stroke="#CFE6EA" stroke-width="3"/>
      <path d="M0 18 Q0 0 18 0 L212 0 Q230 0 230 18 L230 46 L0 46 Z" fill="#0E3A47"/>
      <text x="20" y="30" font-family="'Hiragino Maru Gothic ProN',sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">暮らしのカルテ</text>
      <g stroke="#DCE8E7" stroke-width="2">
        <line x1="20" y1="120" x2="210" y2="120"/><line x1="20" y1="148" x2="210" y2="148"/><line x1="20" y1="176" x2="140" y2="176"/>
      </g>
      <path d="M62 70 C80 94 90 106 90 118 a28 28 0 0 1-56 0 C34 106 44 94 62 70 Z" fill="url(#od)"/>
      <text x="62" y="122" text-anchor="middle" font-family="Verdana,sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">82</text>
      <text x="110" y="90" font-family="'Hiragino Maru Gothic ProN',sans-serif" font-size="13" font-weight="700" fill="#0E3A47">あなたの</text>
      <text x="110" y="108" font-family="'Hiragino Maru Gothic ProN',sans-serif" font-size="13" font-weight="700" fill="#0E3A47">暮らしタイプ</text>
      <circle cx="196" cy="150" r="26" fill="#F4795B"/>
      <text x="196" y="155" text-anchor="middle" font-family="'Hiragino Maru Gothic ProN',sans-serif" font-size="13" font-weight="800" fill="#FFFFFF">診断</text>
    </g>
  </g>
</svg>
