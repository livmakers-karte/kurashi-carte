<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="住まいのダニ・アレルギー診断">
  <rect width="128" height="128" rx="28" fill="#DCEEF0"/>
  <!-- pillow / bedding -->
  <g transform="translate(20 60)">
    <rect x="0" y="0" width="70" height="34" rx="12" fill="#F7FCFC" stroke="#2C7E92" stroke-width="3"/>
    <path d="M12 8 q8 -6 16 0" fill="none" stroke="#8FD3E0" stroke-width="3" stroke-linecap="round"/>
    <path d="M40 12 q8 -6 16 0" fill="none" stroke="#8FD3E0" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- gentle steam/air -->
  <g fill="none" stroke="#74B79B" stroke-width="3" stroke-linecap="round" opacity="0.7">
    <path d="M30 46 q6 -8 0 -16"/>
    <path d="M44 42 q6 -8 0 -16"/>
  </g>
  <!-- magnifier (check, not exterminate) -->
  <g transform="translate(66 30)">
    <circle cx="20" cy="20" r="18" fill="#FBDDD3" stroke="#F4795B" stroke-width="4"/>
    <circle cx="20" cy="20" r="18" fill="#F4795B" opacity="0.08"/>
    <line x1="33" y1="33" x2="46" y2="46" stroke="#F4795B" stroke-width="6" stroke-linecap="round"/>
    <!-- tiny friendly speck -->
    <circle cx="16" cy="20" r="2.6" fill="#0E3A47"/>
    <circle cx="25" cy="17" r="2" fill="#0E3A47" opacity="0.7"/>
  </g>
</svg>
