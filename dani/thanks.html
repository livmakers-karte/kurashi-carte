<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<link rel="canonical" href="https://kurashi-carte.jp/dani/thanks.html">

<style>
  :root{
    --indigo:#29396A; --indigo-2:#3A4E86; --sky:#5E8CCB; --sky-soft:#EAF0F8;
    --linen:#FCF8F1; --linen-2:#F1EBDD; --line:#E6DECE;
    --amber:#EEA23C; --amber-2:#D98A26; --rose:#C7677A;
    --ink:#2A2E3A; --muted:#6E7180;
    --disp:"Yu Gothic UI","BIZ UDPGothic","Hiragino Kaku Gothic ProN","Meiryo",sans-serif;
    --sans:system-ui,-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;
    --num:"Bahnschrift","DIN Alternate","Yu Gothic UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:var(--sans);color:var(--ink);line-height:1.8;font-size:16px;
    background:radial-gradient(1000px 460px at 88% -8%,rgba(238,162,60,.1),transparent 60%),radial-gradient(rgba(41,57,106,.05) 1.1px,transparent 1.2px) 0 0/22px 22px,var(--linen);}
  .wrap{max-width:720px;margin:0 auto;padding:0 20px}
  h1,h2,h3{font-family:var(--disp);font-weight:800;color:var(--indigo);line-height:1.42}
  a{color:var(--indigo-2)}
  .num{font-family:var(--num);font-variant-numeric:tabular-nums}
  header.site{background:var(--indigo);color:#fff}
  header.site .wrap{display:flex;align-items:center;justify-content:space-between;height:60px}
  .brand{display:flex;align-items:center;gap:11px;color:#fff;text-decoration:none}
  .brand .emblem{width:32px;height:32px}
  .brand .mark{font-family:var(--disp);font-size:16px;font-weight:800}
  .home-link{color:#c3cee8;text-decoration:none;font-size:12.5px}
  .hero{background:linear-gradient(158deg,var(--indigo),#20305c);color:#fff;padding:34px 0 30px;text-align:center}
  .hero .chk{width:58px;height:58px;border-radius:50%;background:rgba(238,162,60,.2);border:2px solid var(--amber);color:#ffce87;display:inline-flex;align-items:center;justify-content:center;font-size:30px;margin:0 0 12px}
  .hero h1{color:#fff;font-size:clamp(21px,4.6vw,28px);margin:0 0 8px}
  .hero p{color:#d7deee;font-size:14px;margin:0;max-width:34em;margin:0 auto}
  main{padding:26px 0 40px}
  .record{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:0 12px 34px rgba(41,57,106,.1);overflow:hidden;margin:0 0 24px}
  .record-top{background:var(--linen-2);padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-family:var(--disp);font-weight:800;color:var(--indigo);font-size:14px}
  .record-top .num{font-size:12px;color:var(--muted);font-weight:400}
  .record-body{padding:20px 20px 22px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
  .rb-idx{text-align:center;min-width:130px}
  .rb-idx .val{font-family:var(--num);font-size:64px;font-weight:700;line-height:.85;color:var(--indigo)}
  .rb-idx .u{font-size:13px;color:var(--muted)}
  .rb-idx .band{display:inline-block;margin-top:6px;font-family:var(--disp);font-weight:800;font-size:13px;color:#fff;background:var(--amber);border-radius:10px;padding:3px 12px}
  .rb-meta{flex:1;min-width:200px;font-size:13.5px;color:#3f4351}
  .rb-meta dl{margin:0;display:grid;grid-template-columns:auto 1fr;gap:6px 12px}
  .rb-meta dt{color:var(--muted)}
  .rb-meta dd{margin:0;font-weight:700}
  .note{font-size:12px;color:var(--muted);padding:0 20px 18px;margin:0}
  .sec{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin:0 0 15px}
  .sec.primary{border-color:var(--amber);background:#fdf6ea}
  .sec h3{font-size:16.5px;margin:0 0 6px}
  .sec p{font-size:13.5px;color:#3f4351;margin:0 0 14px}
  .cta{display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;font-weight:800;padding:14px 20px;border-radius:12px;min-height:50px;font-size:14.5px;font-family:var(--disp)}
  .cta.main{background:var(--amber);color:#3a2a08}
  .cta.line{background:#06C755;color:#fff}
  .cta.ghost{background:#fff;color:var(--indigo);border:1.5px solid var(--line)}
  .cta:focus-visible{outline:3px solid var(--indigo);outline-offset:2px}
  .crosslinks{display:grid;gap:9px}
  .crosslink{display:flex;align-items:center;gap:11px;border:1.5px solid var(--line);border-radius:11px;padding:13px 15px;text-decoration:none;color:var(--ink);font-size:14px;font-weight:700;background:#fff}
  .crosslink:hover{border-color:var(--sky);background:var(--sky-soft)}
  .crosslink .arw{margin-left:auto;color:var(--amber-2)}
  .disc{border:1px solid #e2c6ce;background:#fbf1f3;border-radius:12px;padding:14px 16px;font-size:12px;color:#6e3b47;line-height:1.7;margin:18px 0 0}
  footer.site{background:var(--indigo);color:#9fb0d6;padding:22px 0;font-size:11.5px;margin-top:8px}
  footer.site a{color:#dbe3f2}
  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

</defs></svg>

<header class="site"><div class="wrap">
  <a class="brand" href="index.html"><svg class="emblem"><use href="#emblem"/></svg><span class="mark" id="brandMark">住まいのダニ・カルテ</span></a>
  <a class="home-link" href="/" id="hubLink">← 暮らしのカルテ</a>
</div></header>

<section class="hero">
  <div class="wrap">
    <div class="chk">✓</div>
    <h1 id="pageTitle">ダニ予報カードを、発行しました。</h1>
    <p id="pageLead"></p>
  </div>
</section>

<main><div class="wrap">
  <div class="record" id="recordCard" style="display:none">
    <div class="record-top"><span id="recordLabel">初回スコア記録票</span><span class="num" id="recKn">—</span></div>
    <div class="record-body">
      <div class="rb-idx">
        <div><span class="val num" id="recIdx">–</span><span class="u"> /100点</span></div>
        <span class="band" id="recBand">—</span>
      </div>
      <div class="rb-meta">
        <dl>
          <dt>指数</dt><dd id="recIdxName">わが家のダニリスク指数</dd>

        </dl>
      </div>
    </div>
    <p class="note">このページのURLをブックマーク／スクリーンショットで保存しておくと、次回この記録票とくらべられます。※初回スコアは目安であり、医療診断ではありません。</p>
  </div>

  <div id="sections"></div>

  <div class="disc" id="discBox"></div>
</div></main>

<footer class="site"><div class="wrap">
  <span id="footCopyright">暮らしのカルテ ／ 住まいのダニ・アレルギー診断</span> ／ <a href="/">母屋へ</a> ／ <a href="index.html">診断トップへ</a>
</div></footer>
